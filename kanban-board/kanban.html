<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kanban board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="kanban.css">
</head>

<body>
    <!-- header -->
    <header class="container-fluid">
        <div class="row-lg-12 d-flex justify-content-between py-3 mx-5">
            <p>Kanban</p>
            <button class="btn text-add-btn d-flex justify-content-center align-items-center" id="add-task"
                data-bs-toggle="modal" data-bs-target="#myModal">Add new
                Task</button>
        </div>
    </header>
    <!-- modal -->
    <div class="modal fade" id="myModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Task</h5>
                    <button class="btn-close bg-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text" class="form-control" placeholder="Enter task Heading" id="taskHeading">
                    <br>
                    <input type="text" class="form-control" placeholder="Enter task" id="taskDiscription">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-primary" id="addTask">Add Task</button>
                </div>

            </div>
        </div>
    </div>

    <!-- main -->
    <main class="container-fluid">
        <div class="row mx-5 gap-3">
            <div class="col-lg rounded-3" id="to-do">
                <div class="d-flex justify-content-between" id="heading">
                    <p>To Do</p>
                    <p id="todoCount">0</p>
                </div>
                <div class="taskContent">
                    <div class="task px-2 py-1 rounded-3 mb-1" draggable="true">
                        <h5>Task 1</h5>
                        <p>Description for Task 1</p>
                        <button class="btn d-flex justify-content-center align-items-center"
                            id="delete-btn">Delete</button>
                    </div>
                </div>
            </div>
            <div class="col-lg rounded-3" id="progress">
                <div class="d-flex justify-content-between" id="heading">
                    <p>In Progress</p>
                    <p id="progressCount">0</p>
                </div>
            </div>
            <div class="col-lg rounded-3" id="done">
                <div class="d-flex justify-content-between" id="heading">
                    <p>Done</p>
                    <p id="doneCount">0</p>
                </div>
            </div>
        </div>
    </main>

    <script src="kanban.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
