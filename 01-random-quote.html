<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random quote generator</title>
    <style>
        .main {
           text-align: center;
           margin-top: 20%;
        }

        #modeBtn {
            position: absolute;
            right: 0%;
            top: 0%;
            height: 40px;
            width: 40px;
            border-radius: 50%;
            text-align: center;
            font-size: 0.7rem;
            cursor: pointer;
        }

        #quoteBtn {
            padding: 5px;
            background-color: skyblue;
            height: 50px;
            width: 120px;
            font-size: 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="mode-btn">
         <button id="modeBtn">Mode</button>
    </div>
    <div class="main">
        <h1 id="print-quote">Honesty is Best policy</h1>
        <button id="quoteBtn">Generate</button>
    </div>

    <script>
        let quotes = [`Success doesn’t come from what you do occasionally, it comes from what you do consistently.`, `Don’t watch the clock; do what it does. Keep going.`, `Dream big. Start small. Act now`, `Success is not final, failure is not fatal: it is the courage to continue that counts.`, `Opportunities don’t happen. You create them.`, `Life is what happens when you’re busy making other plans.`, `In the end, we only regret the chances we didn’t take.`, `Believe you can and you’re halfway there.`, `Don’t be afraid to give up the good to go for the great.`, `Push yourself, because no one else is going to do it for you.`];

        let quoteBtn = document.querySelector("#quoteBtn");
        let printQuote = document.querySelector("#print-quote");
        quoteBtn.onclick = () => {
            let rand = Math.floor(1 + Math.random() * quotes.length);
            console.log(quotes[rand]);
            printQuote.innerText = quotes[rand];
        };

        let mode_btn = document.querySelector("#modeBtn");
        let mode = "light";
        mode_btn.addEventListener("click", function () {
            if (mode == "light") {
                document.querySelector("body").style.backgroundColor = "black";
                document.querySelector("body").style.color = "white";
                mode = "dark";
            }
            else if (mode == "dark") {
                document.querySelector("body").style.backgroundColor = "white";
                document.querySelector("body").style.color = "black";
                mode = "light";
            };

        });

    </script>
</body>

</html>
