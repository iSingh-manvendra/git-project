<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color: aliceblue;
            display: flex;
            justify-content: center;
            margin-top: 10%;
            font-size: 1.5rem;
        }
        input{
            width: 200px;
            height: 30px;
            border-radius: 9px;
            border: none;
        }
        button{
            width: 100px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.2rem;
            text-align: center;
        }

    </style>
</head>
<body>
    <form>
        <h1>Love Calculator</h1>
        <label for="boy">Boy:</label>
        <input type="text" id="Boy" name="Boy" placeholder="Enter Boy name" required>
        <br><br>
        <label for="Girl">Girl:</label>
        <input type="text" id="Girl" name="Girl" placeholder="Enter Girl name" required>
        <h1 class="love_output" style="color: red;"></h1>
        <button type="submit">Submit</button>
    </form>

    <script>
        let form = document.querySelector("form");
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            let boy = document.querySelector("#Boy").value;
            let girl = document.querySelector("#Girl").value;
            let lovePercentage = (boy.length + girl.length)**3%100;
            let output = document.querySelector(".love_output");
            output.textContent = `${lovePercentage}%❤️❤️`;
            form.reset();
        })
    </script>
</body>
</html>
