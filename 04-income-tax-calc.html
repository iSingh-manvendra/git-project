<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income tax Calculator</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(41, 3, 61);
        }

        .main {
            text-align: center;
            height: 510px;
            width: 350px;
            border-radius: 15px;
            color: rgb(248, 249, 250);
            backdrop-filter: blur(50px);
            background: rgba(255, 255, 255, 0.2);

        }

        label {
            font-size: 1.1rem;
            font-weight: 550;
            font-family: 'Courier New', Courier, monospace;
        }

        #name,#age,#income {
            border-radius: 8px;
            width: 150px;
            height: 30px;
            border: none;
        }

        select {
            padding: 5px;
            border-radius: 5px;
        }
        #submit{
            width: 100px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.2rem;
            text-align: center;
        }

    </style>
</head>

<body>
    <div class="main">
        <h1>Income tax Calculator</h1>
        <form>
            <label for="name">Name</label>
            <br>
            <input placeholder="Enter your name" type="text" name="name" id="name" required>
            <br><br>
            <label for="age">Age</label>
            <br>
            <input placeholder="Enter Your age" type="number" name="age" id="age" required>
            <br><br>
            <label for="income">Income</label>
            <br>
            <input type="number" id="income" name="income" placeholder="Enter your Income">
            <br><br>
            <label for="ocupation">Ocupation:</label>
            <br>
            <select id="ocupation">
                <option value="business">business</option>
                <option value="goverment">goverment</option>
                <option value="corporate">corporate</option>
            </select>
            <br><br>
            <label for="gender">Gender:</label>
            <br>
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="female">Female:</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="other">Other:</label>
            <input type="radio" id="other" name="gender" value="other">
            <br><br>
            <button type="submit" id="submit">Submit</button>
            <h1 id="output">TAX:</h1>
        </form>
    </div>

    <script>
        let form = document.querySelector("form");
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            let name = document.querySelector("#name").value;
            let age = document.querySelector("#age").value;
            let income = document.querySelector("#income").value;
            let ocupation = document.querySelector("#ocupation").value;
            let output = document.querySelector("#output");
            let genderSelected = document.querySelector('input[name="gender"]:checked').value;
            console.log(`Name: ${name}`);
            console.log(`Age: ${age}`);
            console.log(`Income1: ${income}`);
            console.log(`Ocupation: ${ocupation}`);
            console.log(`Gender: ${genderSelected}`);
            let tax = 0;
            if(income<=1200000){
                output.textContent = `NILL`;
                console.log("NIL")
            }
            else if(income<=1600000){
                tax = (income-1200000) * 0.15;
                console.log(tax);
                output.textContent = `TAX: ${tax}`;
            }
            else if(income<=2000000){
                tax = (income - 1600000) * 0.20 + 60000;  //2000000 - 1600000 = 400000 and 400000 - 15% = 60000
                console.log(tax);
                output.textContent = `TAX: ${tax}`;
                
            }
            else if(income<= 2400000){
                tax = (income - 2000000) * 0.25 + 60000 + 80000 ; // 
                console.log(tax);
                output.textContent = `TAX: ${tax}`;
            }
            else if(income>2400000){
                tax = (income - 2400000) * 0.30 + 60000 + 80000 + 100000;
                console.log(tax);
                output.textContent = `TAX:${tax}`;
            }
        })
    </script>
</body>

</html>
