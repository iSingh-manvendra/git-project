<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="parent">
        <button class="red" style="background-color: red;">Red</button>
        <button class="greenyellow" style="background-color: greenyellow;">Green</button>
        <button class="pink" style="background-color: pink;">Pink</button>
        <button class="skyblue" style="background-color: skyblue;">blue</button>
        <button class="cyan" style="background-color: cyan;">cyan</button>
        <button class="yellow" style="background-color: yellow;">yellow</button>
    </div>


    <script>
        let parent = document.querySelector(".parent");
        parent.addEventListener("click", (e)=>{
            console.log(e.target);
            let child = e.target;
            let body = document.querySelector("body");
            body.style.backgroundColor = child.className;
        });
    </script>
</body>
</html>
