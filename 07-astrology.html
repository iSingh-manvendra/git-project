<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrology</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:linear-gradient(to bottom,rgb(27, 92, 212),rgb(70, 143, 211));
        }
       
        .main{
            background-color: rgb(10, 10, 111);
            color: white;
            height: 560px;
            width: 350px;
            border-radius: 10px;
        }
        h1{
            text-align: center;
        }
        input{
            width: 90%;
            height: 30px;
            border-radius: 5px;
            border: none;
            margin-left: 4%;
        }
        label{
            margin-left: 4%;
            font-size: 0.8rem;
        }
        button{
            background-color: rgb(68, 187, 234);
            color: white;
            width: 90%;
            height: 40px;
            border-radius: 5px;
            border: none;
            margin-left: 4%;
        }
        textarea{
            margin-left: 4%;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="main">
        <h1>Astrology Insights</h1>
        <form>
            <label for="fname">First Name:</label>
            <br>
            <input id="fname" type="text" placeholder="Enter Your First name" name="fname" required>
            <br><br>
            <label for="lname">Last Name:</label>
            <br>
            <input id="lname" type="text" placeholder="Enter your last name" name="lname" required>
            <br><br>
            <label for="day">Day:</label>
            <br>
            <input id="day" type="number" placeholder="Enter Day" name="day" min="1" max="31" required>
            <br><br>
            <label for="month">Month:</label>
            <br>
            <input id="month" type="text" placeholder="Enter Month" name="month" min="1" max="12" required>
            <br><br>
            <label for="year">Year:</label>
            <br>
            <input id="year" type="number" placeholder="Enter your year" name="year" min="1900" max="2026" required>
            <br><br>
            <button type="submit">Get Insight</button>
            <br><br>
            <textarea name="textarea" id="textarea" rows="3" cols="40"></textarea>
        </form>
    </div>

    <script>

    </script>
</body>
</html>
