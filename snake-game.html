<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake game</title>
    <link rel="stylesheet" href="snake-game.css">
</head>

<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3>High Score :<span id="highScore"> 0</span></h3>
                </div>

                <div class="info">
                    <h3>Score : <span id="score">0</span></h3>
                </div>

                <div class="info">
                    <h3>Time : <span id="time">00-00</span></h3>
                </div>
            </div>
            <div class="board">
                
            </div>

            <div class="modal">
                <div class="startGame">
                    <h1>Welcome to the Game</h1>
                    <br>
                    <button class="btn btn-start">Start Game</button>
                </div>
                <div class="gameOver">
                    <h1>Game Over</h1>
                    <br>
                    <button class="btn btn-restart">Restart Game</button>
                </div>
            </div>


        </section>
    </main>

    <script src="snake-game.js"></script>
</body>

</html>
